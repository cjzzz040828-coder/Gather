server:
  port: 8080

spring:
  application:
    name: campus-admin
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/campus-system?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
    username: root
    password: 123
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      test-while-idle: true
      validation-query: SELECT 1
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: ${DRUID_USERNAME:admin}
        login-password: ${DRUID_PASSWORD:admin123}
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"
      filter:
        stat:
          enabled: true
        wall:
          enabled: true
  data:
    redis:
      host: localhost
      port: 6379
      password: 123
      database: 6
      lettuce:
        pool:
          max-active: 8
          max-wait: -1
          max-idle: 8
          min-idle: 0
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 2000

# Actuator 健康检查：groupbuy.mq.enabled 默认关、本机无 broker 时，
# 关闭 rabbit 健康探活，避免 /actuator/health 反复抛 AmqpConnectException。
# 真正启用 MQ（起了 broker）时可移除本项或置 true。
management:
  health:
    rabbit:
      enabled: false

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.campus.common.entity,com.campus.system.entity,com.campus.file.entity,com.campus.gen.entity,com.campus.message.entity,com.campus.mall.entity,com.campus.job.entity,com.campus.biz.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0


# ======================== 应用配置 ========================
campus:
  # 演示模式配置（此处为开发环境默认值，生产环境请在 application-prod.yml 中配置）
  # true: 开启演示模式，禁止新增、编辑、删除操作
  # false: 关闭演示模式，允许所有操作
  demo-mode: false

# 拼团交易模块配置
groupbuy:
  # MQ 开关：true=成团/失败通知走 RabbitMQ（需本机有 broker）；false=回落本地消息表直接消费
  mq:
    enabled: false
  # 超时未成团扫描间隔(ms)
  timeout-scan:
    delay-ms: 60000
  # 通知补偿扫描间隔(ms)
  notify-compensate:
    delay-ms: 60000

# 日志配置
logging:
  level:
    com.campus: debug
